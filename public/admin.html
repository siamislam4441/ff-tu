<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5 bg-light">
    <h2>Admin - Manage Tournaments</h2>
    <div class="card p-4 shadow">
        <form action="/admin/add" method="POST">
            <div class="mb-3">
                <label>Tournament Title</label>
                <input name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Entry Fee (BDT)</label>
                <input name="fee" type="number" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Status</label>
                <select name="status" class="form-control">
                    <option>Upcoming</option>
                    <option>Live</option>
                    <option>Ended</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Room ID</label>
                <input name="roomID" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Room Password</label>
                <input name="roomPass" class="form-control" required>
            </div>
            <button class="btn btn-primary">Publish Tournament</button>
        </form>
    </div>
</body>
</html>
